services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: genesis
      POSTGRES_USER: genesis
      POSTGRES_PASSWORD: genesis
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genesis"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://genesis:genesis@postgres:5432/genesis?sslmode=disable
      - DEBUG=True
      - SECRET_KEY=test-secret-key-ci
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - FRONTEND_URL=http://frontend:3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      target: dev
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:8000/api
    depends_on:
      - backend

  e2e:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - frontend
    environment:
      - E2E_BASE_URL=http://frontend:3000
      - E2E_API_URL=http://backend:8000/api
      - E2E_TEST_EMAIL=teste_e2e@genesis.com
      - E2E_TEST_PASSWORD=senha_teste_123
