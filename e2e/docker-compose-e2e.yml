services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: genesis
      POSTGRES_USER: genesis
      POSTGRES_PASSWORD: genesis
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U genesis"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://genesis:genesis@postgres:5432/genesis?sslmode=disable
      - DEBUG=True
      - SECRET_KEY=test-secret-key-ci
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - FRONTEND_URL=http://frontend:3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 30s

  frontend:
    build:
      context: ../frontend
      target: dev
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/", "||", "exit", "1"]
      interval: 5s
      timeout: 10s
      retries: 30
      start_period: 10s
