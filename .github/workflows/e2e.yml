name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services
        run: docker compose -f e2e/docker-compose-e2e.yml up -d --build

      - name: Wait for services
        run: |
          timeout 120 bash -c 'until docker compose -f e2e/docker-compose-e2e.yml exec -T frontend wget --quiet --tries=1 --spider http://localhost/ && docker compose -f e2e/docker-compose-e2e.yml exec -T backend curl -f http://localhost:8000/; do sleep 2; done'

      - name: Run E2E tests
        run: docker compose -f e2e/docker-compose-e2e.yml run e2e

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e/report.html
          retention-days: 30

      - name: Stop services
        if: always()
        run: docker compose -f e2e/docker-compose-e2e.yml down
