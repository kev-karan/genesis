name: E2E Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services
        run: docker compose -f e2e/docker-compose-e2e.yml up -d --build

      - name: Wait for services
        run: |
          timeout 180 bash -c '
            until curl -s http://localhost:8000/ > /dev/null; do
              echo "Aguardando backend..."; sleep 2
            done
            echo "Backend OK"
            until curl -s http://localhost:3000/ > /dev/null; do
              echo "Aguardando frontend..."; sleep 2
            done
            echo "Frontend OK"
          '

      - name: Seed test data
        run: docker compose -f e2e/docker-compose-e2e.yml exec -T backend python manage.py loaddata fluxogramas/fixtures/protocolos.json

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: e2e/requirements.txt

      - name: Install dependencies
        run: pip install -r e2e/requirements.txt

      - name: Run E2E tests
        run: pytest e2e/tests -v --html=e2e/report.html --self-contained-html

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f e2e/docker-compose-e2e.yml logs --no-color

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e/report.html
          retention-days: 30

      - name: Stop services
        if: always()
        run: docker compose -f e2e/docker-compose-e2e.yml down
