name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start services
        run: docker compose -f e2e/docker-compose-e2e.yml up -d --build

      - name: Wait for services
        run: |
          timeout 120 bash -c 'until curl -f http://localhost:8000/ && wget --quiet --tries=1 --spider http://localhost:3000/; do sleep 2; done'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: e2e/requirements.txt

      - name: Install dependencies
        run: pip install -r e2e/requirements.txt

      - name: Run E2E tests
        run: pytest e2e/tests -v --html=e2e/report.html --self-contained-html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-report
          path: e2e/report.html
          retention-days: 30

      - name: Stop services
        if: always()
        run: docker compose -f e2e/docker-compose-e2e.yml down
